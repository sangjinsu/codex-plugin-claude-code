name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  offline:
    name: Offline checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Smoke test Claude-free commands
        run: |
          node plugins/claude/scripts/claude-companion.mjs --help
          node plugins/claude/scripts/claude-companion.mjs skills --scope all --query frontend
          node plugins/claude/scripts/claude-companion.mjs plan --list-skills --query plan
          node plugins/claude/scripts/claude-companion.mjs plan --recommend-skills "plan 짤때 쓸 수 있는 것"
          node plugins/claude/scripts/claude-companion.mjs plan --dry-run --show-skills frontend polish
          printf 'Summary\n\n- Validate offline CI.\n\nCurrent Understanding\n\n- Relevant file: `package.json`\n\nPlan\n\n1. Keep CI smoke tests on Claude-free commands.\n\nValidation\n\n- npm test\n\nRisks\n\n- Low risk.\n\nImplementation Checklist\n\n- Run npm test\n' | node plugins/claude/scripts/claude-companion.mjs plan --check -
